version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: galliard-frontend:latest
    container_name: galliard-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
