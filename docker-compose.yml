services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: galliard-frontend:latest
    container_name: galliard-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

  caddy:
    image: caddy:2-alpine
    container_name: galliard-caddy
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
